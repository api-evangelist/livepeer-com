      call: livepeer-studio-webhook.getwebhooklogs
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-a-webhook-log
      description: Retrieve a webhook log
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: livepeer-studio-webhook.getwebhooklog
      with:
        id: tools.id
        logId: tools.logId
      outputParameters:
      - type: object
