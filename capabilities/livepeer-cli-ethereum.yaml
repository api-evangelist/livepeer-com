naftiko: 1.0.0-alpha2
info:
  label: "Livepeer CLI \u2014 Ethereum"
  description: "Livepeer CLI \u2014 Ethereum. 2 operations. Self-contained Naftiko capability for one CLI business surface."
  tags:
  - Livepeer
  - CLI
  - Ethereum
  created: '2026-05-25'
  modified: '2026-05-25'
capability:
  consumes:
  - type: http
    namespace: livepeer-cli-ethereum
    baseUri: http://localhost:5935
    description: "Livepeer CLI \u2014 Ethereum business capability. Self-contained, no shared references."
    resources:
    - name: transferTokens
      path: /transferTokens
      operations:
      - name: transfertokens
        method: POST
        description: Transfer LPT tokens
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: signMessage
      path: /signMessage
      operations:
      - name: signmessage
        method: POST
        description: Sign message
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: livepeer-cli-ethereum-rest
    port: 8100
    description: "REST adapter for Livepeer CLI \u2014 Ethereum."
    resources:
    - path: /transferTokens
      name: transferTokens
      description: REST surface for transferTokens.
      operations:
      - method: POST
        name: transfertokens
        description: Transfer LPT tokens
        call: livepeer-cli-ethereum.transfertokens
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /signMessage
      name: signMessage
      description: REST surface for signMessage.
      operations:
      - method: POST
        name: signmessage
        description: Sign message
        call: livepeer-cli-ethereum.signmessage
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: livepeer-cli-ethereum-mcp
    port: 9110
    transport: http
    description: "MCP adapter for Livepeer CLI \u2014 Ethereum. One tool per consumed operation."
    tools:
    - name: transfer-lpt-tokens
      description: Transfer LPT tokens
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: livepeer-cli-ethereum.transfertokens
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: sign-message
      description: Sign message
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: livepeer-cli-ethereum.signmessage
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
