naftiko: 1.0.0-alpha2
info:
  label: "Livepeer Studio \u2014 Task"
  description: "Livepeer Studio \u2014 Task. 2 operations. Self-contained Naftiko capability for one Studio business surface."
  tags:
  - Livepeer
  - Studio
  - Task
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    LIVEPEER_API_KEY: LIVEPEER_API_KEY
capability:
  consumes:
  - type: http
    namespace: livepeer-studio-task
    baseUri: https://livepeer.studio/api
    description: "Livepeer Studio \u2014 Task business capability. Self-contained, no shared references."
    resources:
    - name: task
      path: /task
      operations:
      - name: gettasks
        method: GET
        description: Retrieve Tasks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: task-taskId
      path: /task/{taskId}
      operations:
      - name: gettask
        method: GET
        description: Retrieve a Task
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: taskId
          in: path
          type: string
          description: ID of the task
          required: true
    authentication:
      type: bearer
      token: '{{env.LIVEPEER_API_KEY}}'
  exposes:
  - type: rest
    namespace: livepeer-studio-task-rest
    port: 8080
    description: "REST adapter for Livepeer Studio \u2014 Task."
    resources:
    - path: /task
      name: task
      description: REST surface for task.
      operations:
      - method: GET
        name: gettasks
        description: Retrieve Tasks
        call: livepeer-studio-task.gettasks
        outputParameters:
        - type: object
          mapping: $.
    - path: /task/{task-id}
      name: task-taskId
      description: REST surface for task-taskId.
      operations:
      - method: GET
        name: gettask
        description: Retrieve a Task
        call: livepeer-studio-task.gettask
        with:
          taskId: rest.taskId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: livepeer-studio-task-mcp
    port: 9090
    transport: http
    description: "MCP adapter for Livepeer Studio \u2014 Task. One tool per consumed operation."
    tools:
    - name: retrieve-tasks
      description: Retrieve Tasks
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: livepeer-studio-task.gettasks
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-a-task
      description: Retrieve a Task
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: livepeer-studio-task.gettask
      with:
        taskId: tools.taskId
      outputParameters:
      - type: object
        mapping: $.
