    port: 9090
    transport: http
    description: "MCP adapter for Livepeer Studio \u2014 Webhook. One tool per consumed operation."
    tools:
    - name: retrieve-a-webhook
      description: Retrieve a Webhook
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: livepeer-studio-webhook.getwebhooks
