naftiko: 1.0.0-alpha2
info:
  label: "Livepeer Studio \u2014 Accesscontrol"
  description: "Livepeer Studio \u2014 Accesscontrol. 5 operations. Self-contained Naftiko capability for one Studio business surface."
  tags:
  - Livepeer
  - Studio
  - Accesscontrol
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    LIVEPEER_API_KEY: LIVEPEER_API_KEY
capability:
  consumes:
  - type: http
    namespace: livepeer-studio-accesscontrol
    baseUri: https://livepeer.studio/api
    description: "Livepeer Studio \u2014 Accesscontrol business capability. Self-contained, no shared references."
    resources:
    - name: access-control-signing-key
      path: /access-control/signing-key
      operations:
      - name: createsigningkey
        method: POST
        description: Create a signing key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getsigningkeys
        method: GET
        description: Retrieves signing keys
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: access-control-signing-key-keyId
      path: /access-control/signing-key/{keyId}
      operations:
      - name: deletesigningkey
        method: DELETE
        description: Delete Signing Key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: keyId
          in: path
          type: string
          description: ID of the signing key
          required: true
      - name: getsigningkey
        method: GET
        description: Retrieves a signing key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: keyId
          in: path
          type: string
          description: ID of the signing key
          required: true
      - name: updatesigningkey
        method: PATCH
        description: Update a signing key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: keyId
          in: path
          type: string
          description: ID of the signing key
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.LIVEPEER_API_KEY}}'
  exposes:
  - type: rest
    namespace: livepeer-studio-accesscontrol-rest
    port: 8080
    description: "REST adapter for Livepeer Studio \u2014 Accesscontrol."
    resources:
    - path: /access-control/signing-key
      name: access-control-signing-key
      description: REST surface for access-control-signing-key.
      operations:
      - method: POST
        name: createsigningkey
        description: Create a signing key
        call: livepeer-studio-accesscontrol.createsigningkey
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: getsigningkeys
        description: Retrieves signing keys
        call: livepeer-studio-accesscontrol.getsigningkeys
        outputParameters:
        - type: object
          mapping: $.
    - path: /access-control/signing-key/{key-id}
      name: access-control-signing-key-keyId
      description: REST surface for access-control-signing-key-keyId.
      operations:
      - method: DELETE
        name: deletesigningkey
        description: Delete Signing Key
        call: livepeer-studio-accesscontrol.deletesigningkey
        with:
          keyId: rest.keyId
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: getsigningkey
        description: Retrieves a signing key
        call: livepeer-studio-accesscontrol.getsigningkey
        with:
          keyId: rest.keyId
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updatesigningkey
        description: Update a signing key
        call: livepeer-studio-accesscontrol.updatesigningkey
        with:
          keyId: rest.keyId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: livepeer-studio-accesscontrol-mcp
    port: 9090
    transport: http
    description: "MCP adapter for Livepeer Studio \u2014 Accesscontrol. One tool per consumed operation."
    tools:
    - name: create-a-signing-key
      description: Create a signing key
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: livepeer-studio-accesscontrol.createsigningkey
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieves-signing-keys
      description: Retrieves signing keys
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: livepeer-studio-accesscontrol.getsigningkeys
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-signing-key
      description: Delete Signing Key
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: livepeer-studio-accesscontrol.deletesigningkey
      with:
        keyId: tools.keyId
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieves-a-signing-key
      description: Retrieves a signing key
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: livepeer-studio-accesscontrol.getsigningkey
      with:
        keyId: tools.keyId
      outputParameters:
      - type: object
        mapping: $.
    - name: update-a-signing-key
      description: Update a signing key
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: livepeer-studio-accesscontrol.updatesigningkey
      with:
        keyId: tools.keyId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
